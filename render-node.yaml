services:
  - type: web
    name: smart-agri-backend
    env: node
    plan: free
    runtime: node
    
    buildCommand: npm install
    startCommand: npm start
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        generateValue: true
