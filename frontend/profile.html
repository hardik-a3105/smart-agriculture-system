<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Profile | Smart Harvest</title>

    <script>
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = "login.html";
        }
    </script>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-emerald: #00b894;
            --deep-navy: #1e272e;
            --surface-light: #f8fafc;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--surface-light);
            color: var(--text-main);
            padding-top: 90px;
        }

        /* Consistent Navigation */
        .navbar {
            background-color: rgba(30, 39, 46, 0.98);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 3px solid var(--primary-emerald);
        }

        .navbar-brand span {
            color: var(--primary-emerald);
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary-emerald) !important;
        }

        /* Profile Header */
        .profile-header {
            background: linear-gradient(135deg, var(--deep-navy) 0%, #34495e 100%);
            color: white;
            padding: 60px 0 100px;
            text-align: center;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: var(--primary-emerald);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 auto 20px;
            border: 5px solid rgba(255, 255, 255, 0.1);
        }

        /* Info Containers */
        .info-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            margin-top: -60px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--deep-navy);
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--surface-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary-emerald);
        }

        .form-label {
            font-weight: 600;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .form-control:focus {
            background-color: white;
            border-color: var(--primary-emerald);
            box-shadow: 0 0 0 4px rgba(0, 184, 148, 0.1);
        }

        .btn-update {
            background: var(--primary-emerald);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.2);
        }

        .btn-update:hover {
            background: #01a382;
            transform: translateY(-2px);
        }

        .badge-verified {
            background: #e3fcf7;
            color: var(--primary-emerald);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        footer {
            background: var(--deep-navy);
            color: #94a3b8;
            padding: 40px 0;
            text-align: center;
            margin-top: 60px;
        }

        /* Custom Language Dropdown */
        .lang-dropdown {
            background-color: white;
            border: 1px solid #ddd;
            color: #1e272e;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            appearance: auto;
        }

        .lang-dropdown:hover {
            background-color: #f5f5f5;
        }

        /* Hide Google Translate bar */
        .goog-te-banner-frame, .goog-te-balloon-frame, #goog-gt-tt, .goog-te-gadget, .goog-te-combo { display: none !important; }
        body { top: 0 !important; }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">🌾 Smart<span>Harvest</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#profileNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="profileNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">My Profile</a></li>
                    <li class="nav-item ms-lg-2">
                        <select class="lang-dropdown" id="langSelect" onchange="changeLanguage(this.value)">
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                            <option value="gu">Gujarati</option>
                        </select>
                    </li>
                    <li class="nav-item ms-lg-4" id="auth-slot"></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="profile-header">
        <div class="container animate__animated animate__fadeIn">
            <div class="avatar-circle" id="avatar-initial">F</div>
            <h2 class="fw-bold mb-1" id="display-name">Farmer Name</h2>
            <div class="badge-verified"><i class="bi bi-patch-check-fill"></i> Verified Agricultural Identity</div>
        </div>
    </header>

    <main class="container">
        <div class="info-card animate__animated animate__fadeInUp">
            <form id="profile-form" onsubmit="saveProfileChanges(event)">
                <div class="row">
                    <div class="col-lg-6 pe-lg-5">
                        <div class="section-title">
                            <i class="bi bi-person-fill"></i> Personal Information
                        </div>

                        <label class="form-label">Full Name</label>
                        <input type="text" id="form-name" class="form-control" placeholder="Update your name">

                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="form-phone" class="form-control" value="+91 98765 43210">

                        <label class="form-label">Email Address</label>
                        <input type="email" id="form-email" class="form-control" value="farmer@smartharvest.in" readonly style="background-color: #e2e8f0; cursor: not-allowed;" title="Email cannot be changed">

                        <label class="form-label">Language Preference</label>
                        <select class="form-select" id="form-language">
                            <option value="English">English</option>
                            <option value="Gujarati">Gujarati</option>
                            <option value="Hindi">Hindi</option>
                        </select>
                    </div>

                    <div class="col-lg-6 ps-lg-5 border-start">
                        <div class="section-title">
                            <i class="bi bi-geo-alt-fill"></i> Farm Details
                        </div>

                        <label class="form-label">Farm Location (District)</label>
                        <select class="form-select" id="form-region">
                            <option value="Gujarat">Gujarat</option>
                            <option value="Jharkhand">Jharkhand</option>
                            <option value="Maharashtra">Maharashtra</option>
                        </select>

                        <label class="form-label">Total Land Area (Acres)</label>
                        <input type="number" step="0.1" id="form-landArea" class="form-control" value="12.5">

                        <label class="form-label">Default Soil Type</label>
                        <select class="form-select" id="form-soil">
                            <option value="Black">Black Soil</option>
                            <option value="Red">Red Soil</option>
                            <option value="Sandy">Sandy Soil</option>
                        </select>

                        <label class="form-label">Primary Crop Focus</label>
                        <input type="text" id="form-primaryCrop" class="form-control" value="Cotton, Wheat">

                        <label class="form-label">Irrigation Type</label>
                        <select class="form-select" id="form-irrigationType">
                            <option value="Tube Well">Tube Well</option>
                            <option value="Canal">Canal</option>
                            <option value="Drip">Drip Irrigation</option>
                            <option value="Sprinkler">Sprinkler</option>
                        </select>
                        
                        <label class="form-label">Farming Style</label>
                        <select class="form-select" id="form-farmingStyle">
                            <option value="Conventional">Conventional</option>
                            <option value="Organic">Organic</option>
                            <option value="Mixed">Mixed</option>
                        </select>
                    </div>
                </div>

                <div class="text-center mt-5 pt-4 border-top">
                    <button type="submit" class="btn-update">
                        <i class="bi bi-save me-2"></i> Update Profile Details
                    </button>
                    <p class="text-muted small mt-3">Changes will be reflected across your Smart Harvest dashboard
                        instantly.</p>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="small mb-0">© 2026 Smart Harvest System. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
                return;
            }

            const email = localStorage.getItem('farmerEmail');
            if (email) {
                try {
                    const response = await fetch(`/api/profile/${email}`);
                    const data = await response.json();
                    if (data.success && data.user) {
                        const user = data.user;
                        document.getElementById('display-name').innerText = user.name;
                        document.getElementById('avatar-initial').innerText = user.name.charAt(0).toUpperCase();

                        if (document.getElementById('form-name')) document.getElementById('form-name').value = user.name;
                        if (document.getElementById('form-email')) document.getElementById('form-email').value = user.email;
                        if (document.getElementById('form-phone')) document.getElementById('form-phone').value = user.phone || '';
                        if (document.getElementById('form-language')) document.getElementById('form-language').value = user.language || 'English';
                        if (document.getElementById('form-region')) document.getElementById('form-region').value = user.region || '';
                        if (document.getElementById('form-landArea')) document.getElementById('form-landArea').value = user.landArea || '';
                        if (document.getElementById('form-soil')) document.getElementById('form-soil').value = user.soil || '';
                        if (document.getElementById('form-primaryCrop')) document.getElementById('form-primaryCrop').value = user.primaryCrop || '';
                        if (document.getElementById('form-irrigationType')) document.getElementById('form-irrigationType').value = user.irrigationType || 'Tube Well';
                        if (document.getElementById('form-farmingStyle')) document.getElementById('form-farmingStyle').value = user.farmingStyle || 'Conventional';
                        
                        // Sync localStorage
                        localStorage.setItem('farmerName', user.name);
                        localStorage.setItem('farmerRegion', user.region);
                        localStorage.setItem('farmerSoil', user.soil);
                        return; // Successfully loaded from backend
                    }
                } catch (error) {
                    console.error("Failed to fetch profile from backend:", error);
                }
            }

            // Fallback to local storage if backend fetch fails
            const currentName = localStorage.getItem('farmerName') || 'Farmer';
            const currentEmail = localStorage.getItem('farmerEmail') || '';
            const currentRegion = localStorage.getItem('farmerRegion') || '';
            const currentSoil = localStorage.getItem('farmerSoil') || '';

            document.getElementById('display-name').innerText = currentName;
            document.getElementById('avatar-initial').innerText = currentName.charAt(0).toUpperCase();

            const nameField = document.getElementById('form-name');
            if (nameField) nameField.value = currentName;

            const emailField = document.getElementById('form-email');
            if (emailField) emailField.value = currentEmail;

            const regionField = document.getElementById('form-region');
            if (regionField) regionField.value = currentRegion;

            const soilField = document.getElementById('form-soil');
            if (soilField) soilField.value = currentSoil;
        });

        async function saveProfileChanges(event) {
            event.preventDefault();

            const email = document.getElementById('form-email').value.trim();
            const name = document.getElementById('form-name') ? document.getElementById('form-name').value.trim() : '';
            const phone = document.getElementById('form-phone') ? document.getElementById('form-phone').value.trim() : '';
            const language = document.getElementById('form-language') ? document.getElementById('form-language').value : 'English';
            const region = document.getElementById('form-region') ? document.getElementById('form-region').value : '';
            const landArea = document.getElementById('form-landArea') ? parseFloat(document.getElementById('form-landArea').value) : 0;
            const soil = document.getElementById('form-soil') ? document.getElementById('form-soil').value : '';
            const primaryCrop = document.getElementById('form-primaryCrop') ? document.getElementById('form-primaryCrop').value.trim() : '';
            const irrigationType = document.getElementById('form-irrigationType') ? document.getElementById('form-irrigationType').value : 'Tube Well';
            const farmingStyle = document.getElementById('form-farmingStyle') ? document.getElementById('form-farmingStyle').value : 'Conventional';

            const saveBtn = event.target.querySelector('button[type="submit"]');
            const originalText = saveBtn ? saveBtn.innerHTML : '';
            if (saveBtn) {
                saveBtn.innerHTML = 'Saving...';
                saveBtn.disabled = true;
            }

            try {
                const response = await fetch("/api/profile", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, name, phone, language, region, landArea, soil, primaryCrop, irrigationType, farmingStyle })
                });

                const data = await response.json();

                if (data.success) {
                    // Update localStorage
                    if (name) localStorage.setItem('farmerName', name);
                    if (email) localStorage.setItem('farmerEmail', email);
                    if (region) localStorage.setItem('farmerRegion', region);
                    if (soil) localStorage.setItem('farmerSoil', soil);

                    // Refresh display
                    if (name) {
                        document.getElementById('display-name').innerText = name;
                        document.getElementById('avatar-initial').innerText = name.charAt(0).toUpperCase();
                    }

                    if (saveBtn) {
                        saveBtn.innerHTML = '✅ Saved!';
                        setTimeout(() => {
                            saveBtn.innerHTML = originalText;
                            saveBtn.disabled = false;
                        }, 2000);
                    }
                } else {
                    alert(data.message || 'Failed to update profile');
                    if (saveBtn) {
                        saveBtn.innerHTML = originalText;
                        saveBtn.disabled = false;
                    }
                }
            } catch (error) {
                console.error("Update profile error:", error);
                alert("Server error while saving profile.");
                if (saveBtn) {
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                }
            }
        }
    </script>
    <div id="google_translate_element" style="display:none;"></div>
    <script src="translate.js"></script>
</body>

</html>
