services:
  - type: web
    name: smart-agri-system
    env: python
    plan: free
    runtime: python-3.11.7
    
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt
    
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7

  - type: web
    name: smart-agri-nodejs
    env: node
    plan: free
    runtime: node-18
    
    buildCommand: npm install
    startCommand: node backend/server.js
    
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: production
