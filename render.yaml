services:
  - type: web
    name: smart-agri-system
    env: python
    plan: free
    runtime: python-3.11.7
    
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt
    
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
